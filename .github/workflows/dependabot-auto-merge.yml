name: Dependabot Auto-Merge

# Reusable workflow: auto-approve + auto-merge non-major Dependabot PRs.
# Called by each repo's .github/workflows/dependabot-auto-merge.yml.
#
# IMPORTANT: this runs in the Dependabot event context, so
# DEPENDABOT_AUTOMERGE_TOKEN must be a *Dependabot* org secret
# (Actions secrets are NOT exposed to Dependabot-triggered runs).
# The token is a fine-grained PAT owned by jfreed-dev (Contents +
# Pull requests + Workflows: RW). GitHub Actions itself cannot approve PRs,
# which is why a PAT identity is required.

on:
  workflow_call:
    secrets:
      DEPENDABOT_AUTOMERGE_TOKEN:
        description: Fine-grained PAT (jfreed-dev) used to approve + merge.
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: [self-hosted, linux]
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Auto-approve patch and minor updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN }}
      - name: Auto-merge patch and minor updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN }}
